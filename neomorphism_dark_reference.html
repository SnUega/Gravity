
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #2E2E33; }

  /* ── БАЗОВЫЙ ЦВЕТ ПОВЕРХНОСТИ ── */
  :root {
    --bg:        #2E2E33;
    --bg-light:  #363640;  /* +8 светлее — верхний свет */
    --bg-dark:   #222226;  /* -8 темнее — нижняя тень */
    --accent:    #8D5A97;
    --accent-l:  #a870b4;
    --text:      #F0EDE8;
    --text-muted:#9A96A2;

    /* Неоморфизм: два box-shadow от ОДНОГО цвета, светлый и тёмный */
    --neo-raised:
      6px 6px 14px #1a1a1e,
      -6px -6px 14px #424248;
    --neo-inset:
      inset 4px 4px 10px #1a1a1e,
      inset -4px -4px 10px #424248;
    --neo-raised-sm:
      3px 3px 8px #1a1a1e,
      -3px -3px 8px #424248;
    --neo-inset-sm:
      inset 2px 2px 6px #1a1a1e,
      inset -2px -2px 6px #424248;
    --neo-accent:
      4px 4px 10px #1a1a1e,
      -4px -4px 10px #424248,
      inset 0 1px 0 rgba(168,112,180,0.35),
      inset 0 -1px 0 rgba(80,30,90,0.4);
  }

  .demo {
    background: var(--bg);
    padding: 32px 24px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: flex-start;
    justify-content: center;
    min-height: 520px;
  }

  /* ═══ КАРТОЧКА ═══ */
  .card {
    background: var(--bg);
    border-radius: 20px;
    box-shadow: var(--neo-raised);
    width: 220px;
    overflow: hidden;
    position: relative;
  }

  /* Тонкая объёмная рамка — светлый верх, тёмный низ */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
    border-left: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(0,0,0,0.35);
    border-right: 1px solid rgba(0,0,0,0.2);
    pointer-events: none;
    z-index: 2;
  }

  /* Вдавленное поле карточки */
  .card-field {
    background: var(--bg);
    box-shadow: var(--neo-inset);
    border-radius: 12px;
    margin: 14px 14px 0;
    height: 120px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-field-number {
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  /* Геометрия внутри поля — SVG */
  .card-geo {
    position: absolute;
    inset: 0;
    opacity: 0.18;
  }

  /* Divider — объёмная полоса */
  .card-divider {
    height: 1px;
    margin: 14px;
    background: linear-gradient(90deg,
      transparent 0%,
      #1a1a1e 20%,
      #424248 50%,
      #1a1a1e 80%,
      transparent 100%
    );
  }

  /* Контент карточки */
  .card-body {
    padding: 0 14px;
  }
  .card-num {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .card-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin: 4px 0 6px;
    line-height: 1.3;
  }
  .card-desc {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* Кнопка — вдавленная */
  .card-btn {
    display: block;
    width: calc(100% - 28px);
    margin: 14px;
    padding: 10px;
    background: var(--bg);
    border: none;
    border-radius: 10px;
    color: var(--text-muted);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: var(--neo-inset-sm);
    transition: all 0.15s ease;
    position: relative;
  }
  .card-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 10px;
    border-top: 1px solid rgba(0,0,0,0.3);
    border-left: 1px solid rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    border-right: 1px solid rgba(255,255,255,0.04);
    pointer-events: none;
  }
  .card-btn:hover {
    color: var(--accent-l);
  }
  .card-btn:active {
    box-shadow:
      inset 5px 5px 12px #1a1a1e,
      inset -5px -5px 12px #424248;
    color: var(--accent);
  }

  /* ═══ КНОПКИ ═══ */
  .btns {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 180px;
    padding-top: 8px;
  }

  /* Поднятая кнопка */
  .btn-raised {
    background: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 13px 20px;
    color: var(--text);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: var(--neo-raised-sm);
    transition: all 0.15s ease;
    position: relative;
  }
  .btn-raised::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    border-top: 1px solid rgba(255,255,255,0.1);
    border-left: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(0,0,0,0.35);
    border-right: 1px solid rgba(0,0,0,0.2);
    pointer-events: none;
  }
  .btn-raised:active {
    box-shadow:
      inset 4px 4px 10px #1a1a1e,
      inset -4px -4px 10px #424248;
  }
  .btn-raised:active::before {
    border-top: 1px solid rgba(0,0,0,0.3);
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  /* Акцентная кнопка */
  .btn-accent {
    background: var(--accent);
    border: none;
    border-radius: 12px;
    padding: 13px 20px;
    color: rgba(255,255,255,0.95);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow:
      4px 4px 10px #1a1a1e,
      -4px -4px 10px #424248,
      inset 0 1px 0 rgba(168,112,180,0.5),
      inset 0 -1px 0 rgba(60,20,70,0.5);
    transition: all 0.15s ease;
    position: relative;
  }
  .btn-accent::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    border-top: 1px solid rgba(255,255,255,0.22);
    border-left: 1px solid rgba(255,255,255,0.12);
    border-bottom: 1px solid rgba(0,0,0,0.4);
    border-right: 1px solid rgba(0,0,0,0.25);
    pointer-events: none;
  }
  .btn-accent:active {
    box-shadow:
      inset 4px 4px 10px rgba(0,0,0,0.5),
      inset -4px -4px 10px rgba(0,0,0,0.2),
      inset 0 2px 4px rgba(0,0,0,0.4);
  }
  .btn-accent:active::before {
    border-top: 1px solid rgba(0,0,0,0.4);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  /* Вдавленная кнопка */
  .btn-inset {
    background: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 13px 20px;
    color: var(--text-muted);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: var(--neo-inset-sm);
    transition: all 0.15s ease;
    position: relative;
  }
  .btn-inset::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    border-top: 1px solid rgba(0,0,0,0.3);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    pointer-events: none;
  }
  .btn-inset:hover { color: var(--text); }

  /* ═══ ИКОНКИ-КРУЖКИ ═══ */
  .circles {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    width: 200px;
  }
  .circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--bg);
    box-shadow: var(--neo-raised-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .circle::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border-top: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(0,0,0,0.3);
    pointer-events: none;
  }
  .circle:active {
    box-shadow: var(--neo-inset-sm);
  }
  .circle:active::before {
    border-top: 1px solid rgba(0,0,0,0.3);
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .circle svg { opacity: 0.6; }
  .circle:hover svg { opacity: 1; }

  /* Акцентный кружок */
  .circle-accent {
    background: var(--accent);
    box-shadow:
      4px 4px 10px #1a1a1e,
      -4px -4px 10px #424248,
      inset 0 1px 0 rgba(168,112,180,0.45),
      inset 0 -1px 0 rgba(60,20,70,0.45);
  }
  .circle-accent::before {
    border-top: 1px solid rgba(255,255,255,0.22);
    border-bottom: 1px solid rgba(0,0,0,0.4);
  }
  .circle-accent:active {
    box-shadow:
      inset 3px 3px 8px rgba(0,0,0,0.45),
      inset -3px -3px 8px rgba(0,0,0,0.15);
  }
  .circle-accent svg { opacity: 1; }

  .label {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
</style>

<div class="demo">

  <!-- КАРТОЧКА -->
  <div>
    <p class="label">Карточка</p>
    <div class="card">
      <!-- Вдавленное поле с геометрией -->
      <div class="card-field">
        <svg class="card-geo" viewBox="0 0 192 120">
          <rect x="36" y="20" width="80" height="80" fill="none" stroke="#8D5A97" stroke-width="0.8" opacity="0.8"/>
          <rect x="76" y="20" width="80" height="80" fill="none" stroke="#8D5A97" stroke-width="0.5"/>

      <!-- Объёмный divider -->
      <div class="card-divider"></div>

      <div class="card-body">

        <div class="card-desc">Биоревитализация, ботулотоксин, контурная пластика</div>
      </div>

      <!-- Вдавленная кнопка -->
      <button class="card-btn">Подробнее →</button>
    </div>
  </div>

  <!-- КНОПКИ -->
  <div>
    <p class="label">Кнопки</p>
    <div class="btns">
      <button class="btn-raised">Поднятая</button>
      <button class="btn-accent">Акцентная</button>
      <button class="btn-inset">Вдавленная</button>
    </div>
  </div>

  <!-- ИКОНКИ -->
  <div>
    <p class="label">Иконки-кружки</p>
    <div class="circles">
      <div class="circle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F0EDE8" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.81 19.79 19.79 0 01.22 2.18 2 2 0 012.18 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.18 6.18l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92"/></svg>
      </div>
      <div class="circle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F0EDE8" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      </div>
      <div class="circle circle-accent">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>

      <div class="circle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F0EDE8" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>

      <div class="circle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F0EDE8" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

</div>
